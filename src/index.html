<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>Data Defenders</title>
<style>
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#03060e; touch-action:none;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif; user-select:none; -webkit-user-select:none; }
  canvas { display:block; position:fixed; inset:0; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ============================================================
// DATA DEFENDERS — dual-thumb radial defense prototype
// ============================================================

const canvas = document.getElementById('game');
let ctx = canvas.getContext('2d'); // rebindable so offscreen layers can reuse the painters
let W = 0, H = 0, DPR = 1;
let SAFE = { t: 0, b: 0, l: 0, r: 0 }; // safe-area insets mapped into game space
function withCanvas(cv, fn) {
  const o = ctx; ctx = cv.getContext('2d');
  try { fn(); } finally { ctx = o; }
}

let ROT = false; // landscape-only: on portrait screens the whole game renders rotated 90°
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const cw = window.innerWidth, ch = window.innerHeight;
  ROT = ch > cw;
  W = ROT ? ch : cw; H = ROT ? cw : ch;
  canvas.width = cw * DPR; canvas.height = ch * DPR;
  canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
  if (ROT) ctx.setTransform(0, DPR, -DPR, 0, cw * DPR, 0);
  else ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // notch / home-indicator insets, rotated with the game when in portrait
  try {
    const cs = getComputedStyle(document.documentElement);
    const px = v => parseFloat(cs.getPropertyValue(v)) || 0;
    const st = px('--sat'), sb = px('--sab'), sl = px('--sal'), sr = px('--sar');
    SAFE = ROT ? { l: st, r: sb, t: sr, b: sl } : { t: st, b: sb, l: sl, r: sr };
  } catch (e) { SAFE = { t: 0, b: 0, l: 0, r: 0 }; }
  buildBackground();
  buildMenuCache();
}
window.addEventListener('resize', resize);
// map screen-space pointer coords into (possibly rotated) game space
function evPos(e) {
  return ROT ? { x: e.clientY, y: window.innerWidth - e.clientX } : { x: e.clientX, y: e.clientY };
}

// ---------- utils ----------
const TAU = Math.PI * 2;
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
function angDiff(a, b) { let d = (a - b) % TAU; if (d > Math.PI) d -= TAU; if (d < -Math.PI) d += TAU; return d; }
const rand = (a, b) => a + Math.random() * (b - a);

// ---------- audio ----------
let AC = null, sfxGain = null;
const settings = {
  sound: true, soundVol: 0.8, music: true, musicVol: 0.5, haptics: true,
  aimAssist: false // soft magnet toward arriving traps (accessibility; raw skill by default)
};
// score-chase modifiers — unlocked with the campaign, toggled on the menu
const mutators = { oneLife: false, fast: false, noPickups: false };
const mutMul = () => (mutators.oneLife ? 2 : 1) * (mutators.fast ? 1.5 : 1) * (mutators.noPickups ? 1.3 : 1);
function applySettings() {
  saveState();
  if (sfxGain) sfxGain.gain.value = settings.sound ? settings.soundVol : 0;
  updateMusic(); // volumes live on the takes; nudge now for instant slider feedback
}
function initAC() {
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    sfxGain = AC.createGain(); sfxGain.connect(AC.destination);
    applySettings();
  } catch (e) {}
}
function audio() {
  initAC();
  if (AC && AC.state === 'suspended') AC.resume().catch(() => {});
  // (re)start the right track — every audio() call originates from a user gesture
  playTrack(state === S.PLAY || state === S.PAUSE ? runTrack : 'menu');
  return AC;
}
function tone(freq, dur, type, vol, slideTo, dest) {
  const ac = AC; if (!ac || !sfxGain) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square'; o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g); g.connect(dest || sfxGain); o.start(); o.stop(ac.currentTime + dur);
}
// ---------- soundtrack (MUSIC_DATA is injected in a script at the end of this file) ----------
// menu: View From The Dashboard · L1: Sub Level Three · L2: Steel and Rain · L3: Terminal Velocity
// Web Audio looper: each track is decoded to a buffer and looped sample-accurately
// (native <audio loop> always has an audible seam on mp3). Encoder padding is
// trimmed via loopStart/loopEnd. One decoded track is held in memory at a time.
let musicGain = null, musicSrc = null, musicFilter = null;
let musicStartAt = 0, beatPeriod = 0, musicCut = 16000;
let currentTrackKey = null, musicLoadKey = null;
let musicFade = 1; // 0→1 whenever a track starts from silence
let musicRate = 1; // eased playback rate — slow-mo drags the track down with it
const musicVolume = () => settings.music ? settings.musicVol : 0;
const MUSIC_FADEIN = 2.2; // seconds to fade a track in
const trackUrl = k => k === 'menu' ? window.MUSIC_DATA.menu : window.MUSIC_DATA.levels[k];
function stopMusicSrc() {
  if (musicSrc) {
    try { musicSrc.stop(); } catch (e) {}
    try { musicSrc.disconnect(); } catch (e) {}
  }
  musicSrc = null;
}
// estimate the track's beat period (sec) — energy-flux autocorrelation over 60–180 BPM
function detectBeat(buf) {
  try {
    const sr = buf.sampleRate, d = buf.getChannelData(0);
    const hop = Math.floor(sr * 0.02); // 20ms energy windows over the first minute
    const N = Math.min(d.length, sr * 60);
    const env = [];
    for (let i = 0; i + hop < N; i += hop) {
      let e = 0;
      for (let j = i; j < i + hop; j += 4) e += d[j] * d[j];
      env.push(e);
    }
    const flux = env.map((e, i) => Math.max(0, e - (env[i - 1] || 0)));
    const corr = [];
    let best = 0;
    for (let lag = 16; lag <= 50; lag++) { // 0.32s–1.0s per beat
      let c = 0;
      for (let i = 0; i + lag < flux.length; i++) c += flux[i] * flux[i + lag];
      corr.push([lag, c]);
      if (c > best) best = c;
    }
    // smallest lag near the peak — a periodic signal correlates at every multiple
    for (const [lag, c] of corr) if (c >= best * 0.85) return lag * 0.02;
    return 0;
  } catch (e) { return 0; }
}
// snap a spawn delay so the trap ARRIVES at the ring on a beat
function beatQuantize(delay, travel) {
  if (!beatPeriod || !AC || !musicSrc) return delay;
  const pos = AC.currentTime - musicStartAt;
  const arrive = pos + delay + (travel || 0);
  const snapped = Math.round(arrive / beatPeriod) * beatPeriod;
  return Math.max(snapped - (travel || 0) - pos, Math.max(0.25, delay * 0.5));
}
// find where the real signal starts/ends so the loop skips encoder padding
function loopPoints(buf) {
  const d = buf.getChannelData(0), thr = 0.001;
  let s = 0, e = d.length - 1;
  while (s < e && Math.abs(d[s]) < thr) s++;
  while (e > s && Math.abs(d[e]) < thr) e--;
  return { start: s / buf.sampleRate, end: (e + 1) / buf.sampleRate };
}
function playTrack(key) {
  if (!window.MUSIC_DATA) return;
  initAC(); if (!AC) return;
  if (!musicGain) {
    musicGain = AC.createGain(); musicGain.gain.value = 0; musicGain.connect(AC.destination);
    musicFilter = AC.createBiquadFilter(); // "system critical" muffle at low integrity
    musicFilter.type = 'lowpass'; musicFilter.frequency.value = 16000;
    musicFilter.connect(musicGain);
  }
  if (key === currentTrackKey && (musicSrc || musicLoadKey === key)) return;
  currentTrackKey = key; musicLoadKey = key;
  stopMusicSrc();
  fetch(trackUrl(key))
    .then(r => r.arrayBuffer())
    .then(a => AC.decodeAudioData(a))
    .then(buf => {
      if (currentTrackKey !== key) return; // switched tracks while decoding
      musicLoadKey = null;
      const lp = loopPoints(buf);
      musicSrc = AC.createBufferSource();
      musicSrc.buffer = buf;
      musicSrc.loop = true;
      musicSrc.loopStart = lp.start; musicSrc.loopEnd = lp.end;
      musicSrc.playbackRate.value = musicRate;
      musicSrc.connect(musicFilter);
      musicFade = 0; musicGain.gain.value = 0; // rise from silence
      musicSrc.start(0, lp.start);
      musicStartAt = AC.currentTime;
      beatPeriod = detectBeat(buf); // tempo grid for spawn choreography
    })
    .catch(() => { if (musicLoadKey === key) musicLoadKey = null; });
}
// runs every frame: drives the fade-in, volume, and the slow-mo tape-warp
function updateMusic(dt) {
  musicFade = Math.min(1, musicFade + (dt || 0) / MUSIC_FADEIN);
  const rateTarget = (state === S.PLAY && fx.slow > 0) ? 0.72 : 1;
  musicRate += (rateTarget - musicRate) * Math.min(1, (dt || 0) * 5);
  if (musicSrc && musicSrc.playbackRate) musicSrc.playbackRate.value = musicRate;
  if (musicFilter) { // the payload's health bleeds into the mix
    const open = 16000;
    const target = state === S.PLAY ? 700 * Math.pow(open / 700, clamp(integrity, 0, 100) / 100) : open;
    musicCut += (target - musicCut) * Math.min(1, (dt || 0) * 3);
    musicFilter.frequency.value = musicCut;
  }
  if (!musicGain) return;
  const f = musicFade * musicFade * (3 - 2 * musicFade); // smoothstep
  musicGain.gain.value = musicVolume() * f;
}
// haptics: Capacitor Haptics on device, vibration API on the web
function buzz(pattern) {
  if (!settings.haptics) return;
  const cap = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Haptics;
  try {
    if (cap) {
      if (Array.isArray(pattern)) cap.vibrate({ duration: pattern.reduce((a, b) => a + b, 0) });
      else cap.impact({ style: pattern >= 30 ? 'Heavy' : pattern >= 20 ? 'Medium' : 'Light' });
    } else if (navigator.vibrate) navigator.vibrate(pattern);
  } catch (e) {}
}
const sfx = {
  zap(combo) { // pitch climbs with the combo — every zap in a streak sounds sweeter
    const m = Math.pow(1.059, Math.min(combo || 1, 12));
    tone(880 * m, 0.12, 'square', 0.10, 220 * m);
    tone(1760 * m, 0.08, 'sawtooth', 0.05, 440 * m);
  },
  pick() { tone(660, 0.09, 'triangle', 0.12, 880); tone(1320, 0.14, 'triangle', 0.10, 1760); },
  slowDown() { tone(880, 0.50, 'sawtooth', 0.12, 180); tone(440, 0.65, 'triangle', 0.10, 110); },
  perfect() { tone(2093, 0.14, 'triangle', 0.13, 2637); tone(3136, 0.10, 'sine', 0.08, 3520); },
  speedUp()  { tone(180, 0.45, 'sawtooth', 0.11, 880); tone(110, 0.55, 'triangle', 0.09, 440); },
  miss() { tone(160, 0.35, 'sawtooth', 0.14, 60); },
  win()  { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.22, 'triangle', 0.12), i * 130)); },
  fail() { [330, 262, 196].forEach((f, i) => setTimeout(() => tone(f, 0.3, 'sawtooth', 0.1), i * 180)); },
  tick() { tone(1200, 0.05, 'square', 0.05); }
};

// ---------- background (deep data-space behind the tunnel walls) ----------
let bgCanvas = null, vignetteCanvas = null, wallTex = null;
let bgMotes = [], glitchT = 0, glitchY = 0, nextGlitch = 3;
let litPanels = [], wallSnips = [];
function randCode() {
  let s = '';
  const hex = Math.random() < 0.25;
  const len = hex ? 4 + (Math.random() * 4 | 0) : 6 + (Math.random() * 9 | 0);
  for (let j = 0; j < len; j++) s += hex ? '0123456789ABCDEF'[Math.random() * 16 | 0] : (Math.random() < 0.5 ? '0' : '1');
  return hex ? '0x' + s : s;
}
function buildBackground() {
  // live layer state
  bgMotes = [];
  for (let i = 0; i < 18; i++) {
    bgMotes.push({ x: Math.random() * W, y: Math.random() * H, sp: rand(4, 14), r: rand(0.6, 1.8), ph: rand(0, TAU), white: Math.random() < 0.3 });
  }
  litPanels = [];
  // code snippets streaming along the tunnel walls (both directions — live traffic)
  wallSnips = [];
  for (let i = 0; i < 30; i++) {
    wallSnips.push({
      a: Math.random() * TAU, z: Math.random(), str: randCode().slice(0, 9),
      amber: Math.random() < 0.22, sp: rand(0.7, 1.4),
      dir: Math.random() < 0.6 ? -1 : 1 // -1 = incoming (toward player), +1 = outgoing
    });
  }
  // vignette cache
  vignetteCanvas = document.createElement('canvas');
  vignetteCanvas.width = W * DPR; vignetteCanvas.height = H * DPR;
  const v = vignetteCanvas.getContext('2d');
  v.setTransform(DPR, 0, 0, DPR, 0, 0);
  const vg = v.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.42, W / 2, H / 2, Math.max(W, H) * 0.72);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.38)');
  v.fillStyle = vg; v.fillRect(0, 0, W, H);

  bgCanvas = document.createElement('canvas');
  bgCanvas.width = W * DPR; bgCanvas.height = H * DPR;
  const b = bgCanvas.getContext('2d');
  b.setTransform(DPR, 0, 0, DPR, 0, 0);
  // deep navy base — the void behind the tunnel wall circuitry
  b.fillStyle = '#020510'; b.fillRect(0, 0, W, H);
  // dense circuit-board traces (visible in the gaps between rings)
  for (let i = 0; i < 85; i++) {
    const roll = Math.random();
    b.strokeStyle = roll < 0.22
      ? 'rgba(255,180,80,' + (0.04 + Math.random() * 0.08).toFixed(2) + ')'
      : roll < 0.32
        ? 'rgba(230,245,255,' + (0.04 + Math.random() * 0.07).toFixed(2) + ')'
        : 'rgba(70,150,240,' + (0.04 + Math.random() * 0.1).toFixed(2) + ')';
    b.lineWidth = Math.random() < 0.15 ? 2 : 1;
    b.beginPath();
    let x = Math.random() * W, y = Math.random() * H;
    b.moveTo(x, y);
    for (let j = 0; j < 4; j++) {
      if (Math.random() < 0.5) x += rand(-80, 80); else y += rand(-50, 50);
      b.lineTo(x, y);
    }
    b.stroke();
  }
  // binary blocks everywhere, layered brightnesses
  b.font = '9px monospace';
  for (let i = 0; i < 130; i++) {
    const al = 0.04 + Math.random() * 0.12;
    const roll = Math.random();
    b.fillStyle = roll < 0.22 ? `rgba(255,190,90,${al.toFixed(2)})`
      : roll < 0.32 ? `rgba(235,248,255,${al.toFixed(2)})`
      : `rgba(90,170,255,${al.toFixed(2)})`;
    b.fillText(randCode(), Math.random() * W, Math.random() * H);
  }
  // small solid data chips
  for (let i = 0; i < 45; i++) {
    const al = 0.05 + Math.random() * 0.1;
    b.fillStyle = Math.random() < 0.25 ? `rgba(255,185,80,${al.toFixed(2)})` : `rgba(100,180,255,${al.toFixed(2)})`;
    b.fillRect(Math.random() * W, Math.random() * H, rand(3, 14), rand(2, 5));
  }

  // --- the tunnel wall texture: one dense annulus of raw data, stamped at many depths ---
  const TS = Math.min(1024, Math.round(Math.min(W, H) * 1.7));
  const half = TS / 2;
  wallTex = document.createElement('canvas');
  wallTex.width = TS; wallTex.height = TS;
  const t = wallTex.getContext('2d');
  t.translate(half, half);
  const inR = half * 0.55, outR = half * 0.98;
  const pick = (al) => {
    const r = Math.random();
    return r < 0.2 ? `rgba(255,185,80,${al})` : r < 0.35 ? `rgba(235,248,255,${al})` : `rgba(80,180,255,${al})`;
  };
  // hundreds of broken concentric arc dashes — the stacked circuitry look
  for (let i = 0; i < 650; i++) {
    const rr = rand(inR, outR);
    const a0 = Math.random() * TAU, len = rand(0.03, 0.5);
    t.strokeStyle = pick((0.1 + Math.random() * 0.4).toFixed(2));
    t.lineWidth = Math.random() < 0.12 ? rand(2, 3.2) : rand(0.6, 1.6);
    t.beginPath(); t.arc(0, 0, rr, a0, a0 + len); t.stroke();
  }
  // binary strings packed around the band
  t.textAlign = 'center';
  for (let i = 0; i < 170; i++) {
    const rr = rand(inR, outR), a0 = Math.random() * TAU;
    t.save();
    t.rotate(a0); t.translate(rr, 0); t.rotate(Math.PI / 2);
    t.font = (7 + Math.random() * 7 | 0) + 'px monospace';
    t.fillStyle = pick((0.12 + Math.random() * 0.3).toFixed(2));
    t.fillText(randCode(), 0, 0);
    t.restore();
  }
  // radial ticks
  for (let i = 0; i < 140; i++) {
    const rr = rand(inR, outR - 14), a0 = Math.random() * TAU;
    t.strokeStyle = pick((0.1 + Math.random() * 0.3).toFixed(2));
    t.lineWidth = 1;
    t.save(); t.rotate(a0);
    t.beginPath(); t.moveTo(rr, 0); t.lineTo(rr + rand(3, 14), 0); t.stroke();
    t.restore();
  }
  // bright specks and chips
  for (let i = 0; i < 160; i++) {
    const rr = rand(inR, outR), a0 = Math.random() * TAU;
    t.fillStyle = pick((0.15 + Math.random() * 0.4).toFixed(2));
    t.save(); t.rotate(a0);
    t.fillRect(rr, 0, rand(1.5, 6), rand(1, 2.5));
    t.restore();
  }
}
// animated background layer: drifting motes + rare glitch scanlines (kept subtle)
function drawLiveBg(dt) {
  for (const m of bgMotes) {
    m.y -= m.sp * dt;
    if (m.y < -4) { m.y = H + 4; m.x = Math.random() * W; }
    const al = 0.06 + (Math.sin(time * 2 + m.ph) * 0.5 + 0.5) * 0.1;
    ctx.fillStyle = m.white ? `rgba(255,255,255,${al.toFixed(2)})` : `rgba(120,220,255,${al.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, TAU); ctx.fill();
  }
  nextGlitch -= dt;
  if (nextGlitch <= 0) { glitchT = 0.12; glitchY = Math.random() * H; nextGlitch = rand(2.5, 6.5); }
  if (glitchT > 0) {
    glitchT -= dt;
    ctx.fillStyle = 'rgba(90,220,255,0.05)';
    ctx.fillRect(0, glitchY, W, 3);
    ctx.fillStyle = 'rgba(255,140,40,0.05)';
    ctx.fillRect(0, glitchY + 7, W, 2);
  }
}
// binary / hex snippets racing along the tunnel axis — glyph by glyph, in true perspective,
// flowing both toward and away from the player like live traffic on the line
function drawWallCode(g, dt) {
  const spd = state === S.PLAY ? 0.55 : 0.2;
  const dz = 0.045; // depth spacing between glyphs — converges with perspective
  ctx.textAlign = 'center';
  for (const c of wallSnips) {
    c.z += dt * spd * c.sp * c.dir;
    if (c.dir < 0 && c.z < -0.08 - c.str.length * dz) { c.z = 1; c.a = Math.random() * TAU; c.str = randCode().slice(0, 9); }
    if (c.dir > 0 && c.z > 1) { c.z = -0.05; c.a = Math.random() * TAU; c.str = randCode().slice(0, 9); }
    const cosA = Math.cos(c.a), sinA = Math.sin(c.a);
    for (let j = 0; j < c.str.length; j++) {
      const zj = c.z + j * dz;
      if (zj > 1 || zj < -0.07) continue;
      const rg = ring(zj, g);
      const fs = 46 * rg.s;
      if (fs < 4) continue;
      const x = rg.x + cosA * rg.r * 0.985, y = rg.y + sinA * rg.r * 0.985;
      const al = Math.min(1 - zj, 1.05) * 0.6 * clamp((zj + 0.07) / 0.12, 0, 1); // glyphs slide past and fade, no pop
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(c.a); // baseline runs along the tunnel direction, toward the vanish point
      ctx.font = Math.min(fs, 17).toFixed(1) + 'px monospace';
      ctx.fillStyle = c.amber ? `rgba(255,190,85,${al.toFixed(2)})` : `rgba(130,200,255,${al.toFixed(2)})`;
      ctx.fillText(c.str[j], 0, 0);
      ctx.restore();
    }
  }
  ctx.textAlign = 'left';
}

// ---------- levels ----------
const LEVELS = [
  { name: 'LOCAL NETWORK',  duration: 40, spawnMin: 1.50, spawnMax: 2.30, speed: 0.34, doubles: 0.00, crawlers: 0.00, heavies: 0.00, lines: 0.00, colors: 0.00, track: 0 },
  { name: 'CITY GRID',      duration: 50, spawnMin: 1.05, spawnMax: 1.80, speed: 0.40, doubles: 0.30, crawlers: 0.00, heavies: 0.22, lines: 0.00, colors: 0.00, track: 1,
    hint: 'NEW THREAT: heavy traps — pin them with BOTH nodes' },
  { name: 'METRO EXCHANGE', duration: 55, spawnMin: 0.95, spawnMax: 1.70, speed: 0.43, doubles: 0.30, crawlers: 0.00, heavies: 0.22, lines: 0.00, colors: 0.00, frags: 0.12, track: 2, bursts: true,
    hint: 'NEW THREAT: burst transmissions — traps arrive in volleys' },
  { name: 'GLOBAL BACKBONE',duration: 60, spawnMin: 0.85, spawnMax: 1.55, speed: 0.46, doubles: 0.35, crawlers: 0.30, heavies: 0.20, lines: 0.20, colors: 0.00, frags: 0.13, track: 0,
    hint: 'NEW THREAT: barrier lines — one node on each end' },
  { name: 'DEEP FIBER',     duration: 60, spawnMin: 0.80, spawnMax: 1.50, speed: 0.46, doubles: 0.35, crawlers: 0.30, heavies: 0.20, lines: 0.20, colors: 0.00, frags: 0.14, track: 1, waves: true,

// ---------- geometry ----------
function geo() {
  const cx = W / 2, cy = H / 2;
  const nodeR = Math.min(W, H) * 0.44;            // the fixed node holder ring — nearly touches top/bottom
  const R0 = Math.hypot(W, H) / 2 * 1.08;         // nearest ring covers the whole screen
  const hitZ = (R0 / nodeR - 1) / 6;              // depth where the tunnel wall crosses the node ring
  // layered sines -> fluid meander like a fiber optic strand
  const sw  = Math.sin(time * 0.50) * 0.34 + Math.sin(time * 0.23) * 0.28 + Math.sin(time * 0.11) * 0.22;
  const swy = Math.sin(time * 0.34) * 0.42 + Math.sin(time * 0.15) * 0.4;
  return { cx, cy, R0, nodeR, hitZ, sw, swy };
}
// depth z: 0 = past the player, 1 = far end. Swerve is anchored at the node ring
// (q=0 there), so traps always arrive exactly on the ring.
function ring(z, g) {
  const s = 1 / (1 + z * 6);
  let q = (z - g.hitZ) / (1 - g.hitZ);
  if (q < 0) q *= 0.4; // gentle opposite parallax for the wall rushing past the ring
  const off = Math.min(W, H) * 0.25;
  return { x: g.cx + g.sw * off * q, y: g.cy + g.swy * off * 0.7 * q, r: g.R0 * s, s };
}

  { steps: [{ b: 0, da: 0 }, { b: 1, da: 0.45 }, { b: 2, da: 0.9 }, { b: 3, da: 1.35 }] },               // sweep

        menuSettings = false; sfx.tick(); return;

    }
    // tap outside the panel dismisses it

        y < menuSetPanel.y || y > menuSetPanel.y + menuSetPanel.h)) {

      y > menuFsRect.y - 6 && y < menuFsRect.y + menuFsRect.h + 6) {

  for (const r2 of menuMutRects) {
    if (x > r2.x - 5 && x < r2.x + r2.w + 5 && y > r2.y - 5 && y < r2.y + r2.h + 5) {

    endNewBest = score > (progress.bests[levelIdx] || 0);
    progress.bests[levelIdx] = Math.max(progress.bests[levelIdx] || 0, score);

    tut.step = 1; tut.t = 0;
  } else if (tut.step === 1 && !alive && !tut.respawn) {
    tut.step = 2; tut.t = 0;
  } else if (tut.step === 2 && tut.t > 1.2) {
    const en = spawnEnemy(rand(-0.4, 0.4), 'normal'); // right side
    en.speedMul = 0.42; en.tut = 'R';
    tut.step = 3; tut.t = 0;
  } else if (tut.step === 3 && !alive && !tut.respawn) {
    tut.step = 4; tut.t = 0;
  } else if (tut.step === 4 && tut.t > 1.6) {
    progress.tutorialDone = true; saveState();
    tut = null;
  }
}
function update(dt) {
  time += dt;
  updateMusic(dt);
  tunnelScroll = (tunnelScroll + dt * (state === S.PLAY ? 1.4 : 0.5)) % 10;
  shake = Math.max(0, shake - dt * 3);
  redFlash = Math.max(0, redFlash - dt * 2);

  // particles & popups & bolts always animate
  for (const p of particles) { p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.vx *= 0.96; p.vy *= 0.96; p.life -= p.decay * dt; }
  particles = particles.filter(p => p.life > 0);
  for (const p of popups) { p.y -= 30 * dt; p.life -= dt * 0.9; }
  popups = popups.filter(p => p.life > 0);
  for (const b of bolts) b.life -= dt;
  bolts = bolts.filter(b => b.life > 0);

  if (state !== S.PLAY) { endT += dt; return; }

  if (endless) LV = endlessCfg(levelT); // difficulty tracks survival time
  const L = LV;

  // effect timers run on real time; hit-stop and slow-mo scale the game clock
  const wasSlow = fx.slow > 0;
  fx.slow = Math.max(0, fx.slow - dt);
  fx.wide = Math.max(0, fx.wide - dt);
  fx.auto = Math.max(0, fx.auto - dt);
  if (wasSlow && fx.slow === 0) sfx.speedUp(); // time snaps back to real speed
  tolVis += ((fx.wide > 0 ? 1.7 : 1) - tolVis) * Math.min(1, dt * 6);
  let sdt = dt;
  if (hitStop > 0) { hitStop = Math.max(0, hitStop - dt); sdt *= 0.12; }
  if (fx.slow > 0) sdt *= 0.55;
  if (!tut) levelT += sdt;

  // keyboard control (desktop testing) — controls always run at full speed
  const kSpd = 4.5 * dt;
  if (keys['a'] || keys['A']) nodes[0].angle -= kSpd;
  if (keys['d'] || keys['D']) nodes[0].angle += kSpd;
  if (keys['ArrowLeft'])  nodes[1].angle -= kSpd;
  if (keys['ArrowRight']) nodes[1].angle += kSpd;

  if (tut) updateTutorial(sdt);
  else if (levelT < L.duration) trySpawn(sdt); // stop spawning once the run distance is covered
  if (burstQ) {
    burstQ.t -= sdt;
    if (burstQ.t <= 0) { spawnEnemy(); burstQ.left--; burstQ.t = 0.35; if (!burstQ.left) burstQ = null; }
  }
  if (patternQ.length) { // choreographed volleys ride the real-time beat grid
    for (const q of patternQ) q.t -= dt;
    while (patternQ.length && patternQ[0].t <= 0) spawnEnemy(patternQ.shift().angle);
  }
  pickupT -= sdt;
  if (!tut && pickupT <= 0) { pickupT = rand(20, 32); if (!mutators.noPickups) spawnPickup(); }

  const g = geo();

  // aim assist (optional): soft magnet toward whatever is about to arrive
  if (settings.aimAssist) {
    for (let i = 0; i < 2; i++) {
      let best = null, bestScore = 1e9;
      const consider = (a, z, lock) => {
        if (lock !== undefined && lock !== i) return; // color locks only attract their node
        if (z > g.hitZ + 0.45 || z < g.hitZ * 0.5) return;
        const da = Math.abs(angDiff(a, nodes[i].angle));
        if (da > 0.5) return;
        const sc = da + Math.abs(z - g.hitZ) * 1.5;
        if (sc < bestScore) { bestScore = sc; best = a; }
      };
      for (const en of enemies) if (!en.dead && !en.resolved && en.type !== 'frag') consider(en.angle, en.z, en.lock);
      for (const p of pickups) if (!p.done) consider(p.angle, p.z);
      if (boss) consider(boss.angle, g.hitZ, undefined);
      if (best !== null) nodes[i].angle += clamp(angDiff(best, nodes[i].angle), -0.6, 0.6) * 2.2 * dt;
    }
  }

  const waveMul = (L.waves ? 1 + 0.3 * Math.sin(levelT * 0.55) : 1) * (mutators.fast ? 1.35 : 1);
  const TOL = 0.314 * tolVis; // angular tolerance ~18°, eased wider by the wide-arc power-up
  const covers = (n, a) => Math.abs(angDiff(n.angle, a)) < TOL;
  const ringXY = a => ({ x: g.cx + Math.cos(a) * g.nodeR, y: g.cy + Math.sin(a) * g.nodeR });
  const railR = g.nodeR - Math.min(W, H) * 0.055 * 0.86;
  const nodeXY = n => ({ x: g.cx + Math.cos(n.angle) * railR, y: g.cy + Math.sin(n.angle) * railR });
  const nearest = a => Math.abs(angDiff(nodes[0].angle, a)) < Math.abs(angDiff(nodes[1].angle, a)) ? nodes[0] : nodes[1];

  for (const en of enemies) {
    en.z -= L.speed * waveMul * (en.speedMul || 1) * sdt;
    en.spin += sdt * 4;
    if (en.drift) en.angle += en.drift * sdt;

    if (!en.dead && !en.resolved && en.z <= g.hitZ) {
      // friendly payload packet: touching it IS the mistake — discrimination target
      if (en.type === 'frag') {
        const touched = covers(nodes[0], en.angle) || covers(nodes[1], en.angle);
        const { x: fx2, y: fy } = ringXY(en.angle);
        if (touched) {
          en.dead = true;
          combo = 0; fragsHit++;
          integrity = Math.max(0, integrity - 25);
          burst(fx2, fy, '#7ee262', 22, 3.5);
          popup(fx2, fy, 'FRIENDLY PACKET DESTROYED', '#ff4a5e');
          redFlash = 1; shake = Math.min(shake + 0.6, 1);
          sfx.miss();
          buzz([40, 40, 60]);
        } else {
          en.resolved = true;
          const bonus = Math.round(50 * mutMul());
          score += bonus;
          popup(fx2, fy, 'packet safe +' + bonus, '#7ee262');
        }
        continue;
      }
      let hit = false;
      const boltPairs = []; // [node, targetAngle] — where the lightning jumps from/to
      if (fx.auto > 0) {
        hit = true; // auto-zap: the firewall clears anything crossing the ring
        if (en.partner) boltPairs.push([nodes[0], en.angle], [nodes[1], en.partner.angle]);
        else boltPairs.push([nearest(en.angle), en.angle]);
      } else if (en.type === 'heavy') {
        // heavy: both nodes must pin it at once
        hit = covers(nodes[0], en.angle) && covers(nodes[1], en.angle);
        if (hit) boltPairs.push([nodes[0], en.angle], [nodes[1], en.angle]);
      } else if (en.type === 'line') {
        // barrier: one node on each end, either assignment
        const p = en.partner;
        if (covers(nodes[0], en.angle) && covers(nodes[1], p.angle)) { hit = true; boltPairs.push([nodes[0], en.angle], [nodes[1], p.angle]); }
        else if (covers(nodes[1], en.angle) && covers(nodes[0], p.angle)) { hit = true; boltPairs.push([nodes[1], en.angle], [nodes[0], p.angle]); }
      } else if (en.lock !== undefined) {
        // color-locked: only the matching node can break it
        hit = covers(nodes[en.lock], en.angle);
        if (hit) boltPairs.push([nodes[en.lock], en.angle]);
      } else {
        const shooter = covers(nodes[0], en.angle) ? nodes[0] : covers(nodes[1], en.angle) ? nodes[1] : null;
        hit = !!shooter;
        if (shooter) boltPairs.push([shooter, en.angle]);
      }
      const { x: ex, y: ey } = ringXY(en.angle);
      if (hit) {
        en.dead = true;
        combo++;
        // precision grading: dead-center coverage doubles the take (never via auto-zap)
        let err = 0;
        for (const [n, a] of boltPairs) err = Math.max(err, Math.abs(angDiff(n.angle, a)));
        const perfect = fx.auto <= 0 && boltPairs.length > 0 && err < TOL * 0.35;
        if (perfect) perfects++;
        const base = en.type === 'heavy' ? 250 : en.type === 'line' ? 300 : en.lock !== undefined ? 150 : 100;
        const pts = Math.round(base * (perfect ? 2 : 1) * mutMul()) * Math.min(combo, 5);
        score += pts; zaps++;
        burst(ex, ey, '#bfeaff', 26, 4);
        burst(ex, ey, '#ffffff', 14, 5);
        if (en.partner) {
          en.partner.dead = true;
          const p2 = ringXY(en.partner.angle);
          burst(p2.x, p2.y, '#bfeaff', 26, 4);
          burst(p2.x, p2.y, '#ffffff', 14, 5);
        }
        for (const [n, a] of boltPairs) {
          const s0 = nodeXY(n), t0 = ringXY(a);
          spawnBolt(s0.x, s0.y, t0.x, t0.y);
        }
        hitStop = Math.min(hitStop + (en.type === 'normal' ? 0.05 : 0.09), 0.12);
        popup(ex, ey, (perfect ? 'PERFECT +' : '+') + pts + (combo >= 3 ? '  x' + Math.min(combo, 5) : ''), perfect ? '#ffe9b0' : '#bfeaff');
        shake = Math.min(shake + (en.type === 'normal' ? 0.35 : 0.5), 0.8);
        sfx.zap(combo);
        if (perfect) sfx.perfect();
        buzz(en.type === 'normal' ? 18 : 30);
      } else {
        en.resolved = true; // slips past the ring and flies by the player
        if (en.partner) en.partner.resolved = true; // the pair fails as one
        if (en.tut) {
          if (tut) { tut.respawn = en.tut; tut.t = 0; } // practice trap: no penalty, try again
        } else {
          misses++; combo = 0;
          integrity = Math.max(0, integrity - 25); // 4 mistakes = corrupted payload
          burst(ex, ey, '#ff4a5e', 20, 3);
          popup(ex, ey, 'DATA STOLEN', '#ff4a5e');
          redFlash = 1; shake = Math.min(shake + 0.6, 1);
          sfx.miss();
          buzz([40, 40, 60]);
        }
      }
    }
  }
  enemies = enemies.filter(e => !e.dead && e.z > 0.03);

  // power-up orbs ride the stream; catching one at the ring arms its effect
  for (const p of pickups) {
    p.z -= L.speed * 0.9 * sdt;
    p.spin += dt * 2;
    if (!p.done && p.z <= g.hitZ) {
      p.done = true;
      if (covers(nodes[0], p.angle) || covers(nodes[1], p.angle)) {
        p.dead = true;
        fx[p.kind] = PICKUPS[p.kind].dur;
        const { x, y } = ringXY(p.angle);
        burst(x, y, '#ffd24a', 24, 4);
        popup(x, y, PICKUPS[p.kind].label, '#ffd24a');
        if (p.kind === 'slow') sfx.slowDown(); else sfx.pick();
        buzz(15);
      }
    }
  }
  pickups = pickups.filter(p => !p.dead && p.z > 0.03);

  // the firewall core: park at the ring, drift, drain under node coverage
  if (boss) {
    boss.spin += sdt * 3;
    boss.flash = Math.max(0, boss.flash - dt);
    if (boss.z > g.hitZ * 1.7) boss.z -= L.speed * 0.5 * sdt;
    boss.angle += boss.drift * sdt;
    boss.retarget -= sdt;
    if (boss.retarget <= 0) {
      boss.retarget = rand(2.5, 4.5);
      boss.drift = (Math.random() < 0.5 ? -1 : 1) * rand(0.15, 0.4);
    }
    for (let i = 0; i < 2; i++) {
      boss.cd[i] = Math.max(0, boss.cd[i] - sdt);
      if (boss.cd[i] <= 0 && boss.z <= g.hitZ * 2 && Math.abs(angDiff(nodes[i].angle, boss.angle)) < TOL * 1.2) {
        boss.cd[i] = 0.55;
        boss.hp--;
        boss.flash = 0.2;
        const t0 = ringXY(boss.angle), s0 = nodeXY(nodes[i]);
        spawnBolt(s0.x, s0.y, t0.x, t0.y);
        burst(t0.x, t0.y, '#d98cff', 18, 4);
        score += Math.round(150 * mutMul());
        hitStop = Math.min(hitStop + 0.04, 0.12);
        sfx.zap(4);
        buzz(20);
        if (boss.hp <= 0) {
          burst(t0.x, t0.y, '#ffffff', 40, 6);
          burst(t0.x, t0.y, '#d98cff', 40, 5);
          popup(t0.x, t0.y, 'FIREWALL DOWN  +' + Math.round(2000 * mutMul()), '#ffd24a');
          score += Math.round(2000 * mutMul());
          boss = null;
          shake = 1;
          buzz([60, 40, 80]);
          endLevel(true);
          return;
        }
      }
    }
    if (boss) {
      boss.minionT -= sdt;
      if (boss.minionT <= 0) { boss.minionT = rand(3.5, 5.5); spawnEnemy(); }
    }
  }

  if (integrity <= 0) { endLevel(false); return; }
  if (!tut && !endless && levelT >= L.duration) {
    if (L.boss) { if (!boss) spawnBoss(); }
    else if (enemies.length === 0) endLevel(true);
  }
}

// ---------- drawing ----------
function drawTunnel(g) {
  // the wall is one dense annulus of data, stamped at receding depths —
  // the inside of a fiber optic line packed with traffic, not clean geometry
  const N = 10;
  for (let i = N - 1; i >= 0; i--) {
    const z = (((i - tunnelScroll) % N) + N) % N / N;
    const rg = ring(z, g);
    const hs = rg.r / 0.75; // texture band mid-radius maps onto this depth's wall radius
    if (hs < 5) continue;
    const a = (1 - z) * 0.85 + 0.08;
    ctx.save();
    ctx.translate(rg.x, rg.y);
    ctx.rotate(i * 0.55 + time * 0.015); // each depth band has its own twist, drifting slowly
    ctx.globalAlpha = a;
    if (wallTex) ctx.drawImage(wallTex, -hs, -hs, hs * 2, hs * 2);
    ctx.restore();
    // the nearest band keeps sliding past the viewer and fades — no pop at the wrap
    if (z > 0.85 && wallTex) {
      const z2 = z - 1;
      const rg2 = ring(z2, g);
      const hs2 = rg2.r / 0.75;
      const a2 = clamp(1 + z2 / 0.15, 0, 1) * 0.9;
      if (a2 > 0.01) {
        ctx.save();
        ctx.translate(rg2.x, rg2.y);
        ctx.rotate(i * 0.55 + time * 0.015);
        ctx.globalAlpha = a2;
        ctx.drawImage(wallTex, -hs2, -hs2, hs2 * 2, hs2 * 2);
        ctx.restore();
      }
    }
  }
  ctx.globalAlpha = 1;
  // vanish point glow
  // warm-white vanish point — the golden river converges into it
  const far = ring(1, g);
  const grad = ctx.createRadialGradient(far.x, far.y, 0, far.x, far.y, far.r * 4.5);
  grad.addColorStop(0, 'rgba(255,244,220,0.6)');
  grad.addColorStop(0.35, 'rgba(255,200,110,0.16)');
  grad.addColorStop(0.7, 'rgba(90,160,255,0.07)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(far.x - far.r * 4.5, far.y - far.r * 4.5, far.r * 9, far.r * 9);
}

// streaming gold data particles (the "payload" river at tunnel bottom)
let streaks = [];
function initStreaks() {
  streaks = [];
  const nGold = lowFX ? 90 : 190, nAmbient = lowFX ? 50 : 110;
  for (let i = 0; i < nGold; i++) {
    streaks.push({
      z: Math.random(),
      a: Math.PI / 2 + rand(-0.55, 0.55),          // biased to bottom
      gold: true, sp: rand(0.5, 1), ord: i / nGold // draw order — the river thins with integrity
    });
  }
  for (let i = 0; i < nAmbient; i++) {
    streaks.push({ z: Math.random(), a: Math.random() * TAU, gold: false, amber: Math.random() < 0.22, sp: rand(0.4, 0.9) });
  }
}
initStreaks();
function drawStreaks(g, dt) {
  // a wounded payload is a thinner, dimmer river
  const riverK = state === S.PLAY ? 0.35 + 0.65 * clamp(integrity / 100, 0, 1) : 1;
  for (const st of streaks) {
    st.z -= dt * (state === S.PLAY ? 0.9 : 0.4) * st.sp;
    if (st.z <= -0.08) { st.z = 1; if (st.gold) st.a = Math.PI / 2 + rand(-0.55, 0.55); }
    if (st.gold && st.ord > riverK) continue;
    const r1 = ring(st.z, g), r2 = ring(Math.min(st.z + (st.gold ? 0.05 : 0.09), 1), g);
    const rr1 = st.gold ? r1.r * rand(0.86, 0.99) : r1.r * 0.97;
    const x1 = r1.x + Math.cos(st.a) * rr1, y1 = r1.y + Math.sin(st.a) * rr1;
    const x2 = r2.x + Math.cos(st.a) * r2.r * 0.95, y2 = r2.y + Math.sin(st.a) * r2.r * 0.95;
    const al = Math.min(1 - st.z, 1.05) * (st.gold ? 0.75 : 0.3) * clamp(1 + st.z / 0.1, 0, 1);
    ctx.strokeStyle = st.gold ? `rgba(255,196,88,${al.toFixed(2)})`
      : st.amber ? `rgba(255,185,90,${al.toFixed(2)})` : `rgba(140,215,255,${al.toFixed(2)})`;
    ctx.lineWidth = st.gold ? lerp(0.5, 2.6, 1 - st.z) : 1;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    // hot core on the nearest gold particles
    if (st.gold && st.z < 0.35) {
      ctx.strokeStyle = `rgba(255,238,190,${(al * 0.7).toFixed(2)})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
  }
}

function drawEnemy(en, g) {
  const rg = ring(Math.max(en.z, 0.02), g);
  const x = rg.x + Math.cos(en.angle) * rg.r;
  const y = rg.y + Math.sin(en.angle) * rg.r;
  let size = lerp(4, Math.min(W, H) * 0.06, 1 - en.z) * (en.sizeMul || 1);
  const near = 1 - en.z;
  // missed traps balloon past the ring and dissolve; fresh ones fade in from the deep
  let fade = en.resolved ? clamp(en.z / g.hitZ, 0, 1) : 1;
  fade *= clamp((1.08 - en.z) / 0.18, 0, 1); // smooth entrance — no popping
  if (fade <= 0.005) return;
  if (en.resolved) size *= 1 + (1 - clamp(en.z / g.hitZ, 0, 1)) * 1.6;
  // iridescent palettes — like the sprite: rich, varied facets, tinted hostile red/orange
  const PAL = en.type === 'frag'
    ? { glow: '110,230,120', tendril: '#1c5a2a', tendrilHi: '#a0f0b0',
        shades: ['#57c95f', '#2f9e46', '#8fe08a', '#1f7a35', '#6fdc74'],
        lights: ['#c8f7c0', '#e8ffe2', '#a0f0b0'] }
    : en.type === 'heavy'
    ? { glow: '200,70,255', tendril: '#4a1060', tendrilHi: '#d98cff',
        shades: ['#b03ae8', '#8a2ad4', '#d465ff', '#6f14b8', '#c44af0'],
        lights: ['#eab8ff', '#f3d4ff', '#d98cff'] }
    : en.lock === 0
    ? { glow: '80,170,255', tendril: '#0f2f66', tendrilHi: '#7db2ff',
        shades: ['#2f7fe0', '#1c4fae', '#4d9bff', '#12398a', '#3f8af0'],
        lights: ['#a8ccff', '#d0e4ff', '#7db2ff'] }
    : en.lock === 1
    ? { glow: '225,240,255', tendril: '#5a6a7e', tendrilHi: '#eaf4ff',
        shades: ['#c8d6e6', '#9fb2c8', '#e8f2fc', '#8194ab', '#d5e2f0'],
        lights: ['#ffffff', '#eef6ff', '#dbe8f6'] }
    : en.crawler
    ? { glow: '255,150,40', tendril: '#8a4a12', tendrilHi: '#ffb361',
        shades: ['#ff8c2a', '#e05e14', '#ffb340', '#c24a08', '#ff7a50'],
        lights: ['#ffd98f', '#ffe9c0', '#ffb361'] }
    : { glow: '255,60,90', tendril: '#6e1030', tendrilHi: '#ff7a8c',
        shades: ['#e8274b', '#ff5a3c', '#d81f6e', '#b3123a', '#ff8c5a'],
        lights: ['#ff9db0', '#ffc9d4', '#ff8ba0'] };

  ctx.save();
  ctx.globalAlpha = fade;
  ctx.translate(x, y);
  ctx.rotate(en.angle + Math.sin(en.spin * 0.7) * 0.2); // slow strain, anchored to the wall

  // dense branching filaments radiating in all directions (fade in as it approaches)
  if (near > 0.2) {
    const ta = clamp((near - 0.2) / 0.45, 0, 1) * fade;
    ctx.lineCap = 'round';
    const tStep = lowFX ? 2 : 1;
    for (let ti = 0; ti < en.tendrils.length; ti += tStep) {
      const t = en.tendrils[ti];
      const wob = Math.sin(en.spin * 1.2 + t.ph) * 0.1;
      const a0 = t.a + wob;
      const L2 = size * t.len;
      const mx = Math.cos(a0 + t.bend * 0.5) * L2 * 0.5, my = Math.sin(a0 + t.bend * 0.5) * L2 * 0.5;
      const ex2 = Math.cos(a0 + t.bend) * L2, ey2 = Math.sin(a0 + t.bend) * L2;
      // main filament — thin, dark, wiry
      ctx.globalAlpha = ta * 0.9;
      ctx.strokeStyle = PAL.tendril;
      ctx.lineWidth = Math.max(0.6, size * 0.05);
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(mx, my, ex2, ey2); ctx.stroke();
      // fork branching off midway
      const bx2 = mx + Math.cos(a0 + t.brA) * L2 * 0.45, by2 = my + Math.sin(a0 + t.brA) * L2 * 0.45;
      ctx.lineWidth = Math.max(0.5, size * 0.035);
      ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(bx2, by2); ctx.stroke();
      // glinting lit filament tips
      if (t.glint) {
        ctx.globalAlpha = ta * (0.4 + (Math.sin(time * 6 + t.ph) * 0.5 + 0.5) * 0.6);
        ctx.strokeStyle = PAL.tendrilHi;
        ctx.lineWidth = Math.max(0.5, size * 0.03);
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(mx, my, ex2, ey2); ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex2, ey2, Math.max(0.8, size * 0.05), 0, TAU); ctx.fill();
      }
    }
    ctx.globalAlpha = fade;
  }

  // hot glow
  const pulse = 1 + Math.sin(en.spin * 2) * 0.08;
  const gl = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 2.4 * pulse);
  gl.addColorStop(0, `rgba(${PAL.glow},0.5)`);
  gl.addColorStop(0.5, `rgba(${PAL.glow},0.16)`);
  gl.addColorStop(1, `rgba(${PAL.glow},0)`);
  ctx.fillStyle = gl;
  ctx.beginPath(); ctx.arc(0, 0, size * 2.4 * pulse, 0, TAU); ctx.fill();

  // faceted iridescent crystal cluster
  for (const s of en.shards) {
    const r = size * s.r * pulse * 0.85;
    const ax = Math.cos(s.a) * r, ay = Math.sin(s.a) * r;
    const b1 = s.a + s.w, b2 = s.a - s.w;
    const bx1 = Math.cos(b1) * r * 0.38, by1 = Math.sin(b1) * r * 0.38;
    const bx2 = Math.cos(b2) * r * 0.38, by2 = Math.sin(b2) * r * 0.38;
    const base = PAL.shades[(s.hue * PAL.shades.length) | 0];
    const lite = PAL.lights[(s.tone * PAL.lights.length) | 0];
    const sg = ctx.createLinearGradient(bx1, by1, ax, ay);
    sg.addColorStop(0, base);
    sg.addColorStop(1, s.tone > 0.55 ? lite : '#3d0a18');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.moveTo(bx1, by1); ctx.lineTo(ax, ay); ctx.lineTo(bx2, by2); ctx.closePath(); ctx.fill();
    // bright facet edge on some shards — the iridescent glint
    if (s.tone > 0.7) {
      ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(bx1, by1); ctx.lineTo(ax, ay); ctx.stroke();
    } else {
      ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.moveTo(bx1, by1); ctx.lineTo(ax, ay); ctx.lineTo(bx2, by2); ctx.closePath(); ctx.stroke();
    }
  }
  // molten amber core burning through the facets
  const cg = ctx.createRadialGradient(-size * 0.12, -size * 0.14, 0, 0, 0, size * 0.48);
  cg.addColorStop(0, '#ffffff');
  cg.addColorStop(0.3, en.type === 'frag' ? '#c8f7c0' : en.type === 'heavy' ? '#e08cff' : en.lock === 0 ? '#7db2ff' : en.lock === 1 ? '#ffffff' : '#ffd24a');
  cg.addColorStop(0.7, en.type === 'frag' ? '#57c95f' : en.type === 'heavy' ? '#b03ae8' : en.lock === 0 ? '#2f7fe0' : en.lock === 1 ? '#c8d6e6' : en.crawler ? '#ff8c2a' : '#ff5a3c');
  cg.addColorStop(1, 'rgba(255,90,60,0)');
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.arc(0, 0, size * 0.48 * pulse, 0, TAU); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.beginPath(); ctx.ellipse(-size * 0.14, -size * 0.17, size * 0.1, size * 0.06, -0.6, 0, TAU); ctx.fill();
  // heavy: dual-lock sigil — orbiting dots in the two node colors, telegraphing "both nodes"
  if (en.type === 'heavy' && near > 0.15) {
    const sa = clamp((near - 0.15) / 0.3, 0, 1) * fade;
    const oa = en.spin * 1.4, or2 = size * 1.08;
    ctx.globalAlpha = sa * 0.55;
    ctx.strokeStyle = 'rgba(230,245,255,0.9)'; ctx.lineWidth = Math.max(0.8, size * 0.05);
    ctx.beginPath(); ctx.arc(0, 0, or2, 0, TAU); ctx.stroke();
    ctx.globalAlpha = sa;
    const ds = Math.max(1.5, size * 0.13);
    ctx.fillStyle = 'rgb(111,227,255)';
    ctx.beginPath(); ctx.arc(Math.cos(oa) * or2, Math.sin(oa) * or2, ds, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(Math.cos(oa + Math.PI) * or2, Math.sin(oa + Math.PI) * or2, ds, 0, TAU); ctx.fill();
    ctx.globalAlpha = fade;
  }
  // color lock sigil — a single orbiting dot in the required node's color
  if (en.lock !== undefined && near > 0.15) {
    const sa = clamp((near - 0.15) / 0.3, 0, 1) * fade;
    const col = en.lock === 0 ? 'rgb(111,227,255)' : '#ffffff';
    ctx.globalAlpha = sa * 0.55;
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(0.8, size * 0.055);
    ctx.beginPath(); ctx.arc(0, 0, size * 1.05, 0, TAU); ctx.stroke();
    ctx.globalAlpha = sa;
    const oa2 = en.spin * 1.4, ds2 = Math.max(1.5, size * 0.13);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(Math.cos(oa2) * size * 1.05, Math.sin(oa2) * size * 1.05, ds2, 0, TAU); ctx.fill();
    ctx.globalAlpha = fade;
  }
  ctx.restore();
}

// lightning arcs from node carriages to zapped traps — jagged, fast fade
function drawBolts() {
  for (const b of bolts) {
    const a = clamp(b.life / b.max, 0, 1);
    const dx = b.x2 - b.x1, dy = b.y2 - b.y1;
    const dl = Math.hypot(dx, dy) || 1;
    const nx = -dy / dl, ny = dx / dl;
    ctx.lineCap = 'round';
    for (let pass = 0; pass < 2; pass++) {
      ctx.strokeStyle = pass === 0 ? 'rgba(140,215,255,' + (a * 0.85).toFixed(2) + ')' : 'rgba(255,255,255,' + a.toFixed(2) + ')';
      ctx.lineWidth = pass === 0 ? 4 : 1.5;
      ctx.beginPath();
      ctx.moveTo(b.x1, b.y1);
      const segs = 7;
      for (let i = 1; i < segs; i++) {
        const t = i / segs;
        const off = (Math.random() - 0.5) * 16 * a;
        ctx.lineTo(b.x1 + dx * t + nx * off, b.y1 + dy * t + ny * off);
      }
      ctx.lineTo(b.x2, b.y2);
      ctx.stroke();
    }
  }
}

// golden power-up orb with a kind-specific icon
function drawPickup(p, g) {
  const rg = ring(Math.max(p.z, 0.02), g);
  const x = rg.x + Math.cos(p.angle) * rg.r, y = rg.y + Math.sin(p.angle) * rg.r;
  const size = lerp(3, Math.min(W, H) * 0.042, 1 - p.z);
  let fade = clamp((1.08 - p.z) / 0.18, 0, 1);
  if (p.done) fade *= clamp(p.z / g.hitZ, 0, 1);
  if (fade <= 0.005) return;
  ctx.save();
  ctx.globalAlpha = fade;
  ctx.translate(x, y);
  const pulse = 1 + Math.sin(time * 5 + p.spin) * 0.1;
  const gl = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 2.6 * pulse);
  gl.addColorStop(0, 'rgba(255,210,74,0.55)');
  gl.addColorStop(1, 'rgba(255,210,74,0)');
  ctx.fillStyle = gl;
  ctx.beginPath(); ctx.arc(0, 0, size * 2.6 * pulse, 0, TAU); ctx.fill();
  ctx.rotate(p.spin * 0.6);
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a2 = i / 6 * TAU;
    i ? ctx.lineTo(Math.cos(a2) * size, Math.sin(a2) * size) : ctx.moveTo(Math.cos(a2) * size, Math.sin(a2) * size);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(60,40,5,0.85)'; ctx.fill();
  ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = Math.max(1, size * 0.14); ctx.stroke();
  ctx.rotate(-p.spin * 0.6);
  ctx.strokeStyle = '#ffe9b0'; ctx.fillStyle = '#ffe9b0';
  ctx.lineWidth = Math.max(1, size * 0.12); ctx.lineCap = 'round';
  const s2 = size * 0.52;
  if (p.kind === 'slow') { // hourglass
    ctx.beginPath();
    ctx.moveTo(-s2 * 0.7, -s2); ctx.lineTo(s2 * 0.7, -s2); ctx.lineTo(-s2 * 0.7, s2); ctx.lineTo(s2 * 0.7, s2);
    ctx.closePath(); ctx.stroke();
  } else if (p.kind === 'wide') { // widening arcs
    ctx.beginPath(); ctx.arc(0, 0, s2 * 0.55, -0.9, 0.9); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, s2 * 1.05, -0.7, 0.7); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, s2 * 0.55, Math.PI - 0.9, Math.PI + 0.9); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, s2 * 1.05, Math.PI - 0.7, Math.PI + 0.7); ctx.stroke();
  } else { // lightning bolt
    ctx.beginPath();
    ctx.moveTo(s2 * 0.3, -s2); ctx.lineTo(-s2 * 0.45, s2 * 0.15); ctx.lineTo(0, s2 * 0.15);
    ctx.lineTo(-s2 * 0.3, s2); ctx.lineTo(s2 * 0.45, -0.15 * s2); ctx.lineTo(0, -0.15 * s2);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// the firewall core — armored violet mass parked at the ring with an hp fan
function drawBoss(g) {
  const rg = ring(Math.max(boss.z, 0.02), g);
  const x = rg.x + Math.cos(boss.angle) * rg.r, y = rg.y + Math.sin(boss.angle) * rg.r;
  const size = Math.min(W, H) * 0.085 * (1 + Math.sin(boss.spin * 1.6) * 0.05);
  const fade = clamp((1.08 - boss.z) / 0.18, 0, 1);
  if (fade <= 0.005) return;
  ctx.save();
  ctx.globalAlpha = fade;
  ctx.translate(x, y);
  const gl = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 3);
  gl.addColorStop(0, 'rgba(210,80,255,0.5)');
  gl.addColorStop(0.5, 'rgba(255,60,90,0.18)');
  gl.addColorStop(1, 'rgba(255,60,90,0)');
  ctx.fillStyle = gl;
  ctx.beginPath(); ctx.arc(0, 0, size * 3, 0, TAU); ctx.fill();
  // rotating shard collar
  ctx.rotate(boss.spin * 0.5);
  for (let i = 0; i < 12; i++) {
    const a2 = i / 12 * TAU;
    const r1 = size * 1.15, r2 = size * (1.5 + (i % 3) * 0.16);
    ctx.fillStyle = i % 2 ? '#8a2ad4' : '#d465ff';
    ctx.beginPath();
    ctx.moveTo(Math.cos(a2 - 0.1) * r1, Math.sin(a2 - 0.1) * r1);
    ctx.lineTo(Math.cos(a2) * r2, Math.sin(a2) * r2);
    ctx.lineTo(Math.cos(a2 + 0.1) * r1, Math.sin(a2 + 0.1) * r1);
    ctx.closePath(); ctx.fill();
  }
  ctx.rotate(-boss.spin * 0.5);
  // armored core, flashing white when drained
  const flash = boss.flash > 0 ? boss.flash / 0.2 : 0;
  const cg2 = ctx.createRadialGradient(-size * 0.15, -size * 0.18, 0, 0, 0, size * 1.1);
  cg2.addColorStop(0, flash > 0.3 ? '#ffffff' : '#f3d4ff');
  cg2.addColorStop(0.45, '#b03ae8');
  cg2.addColorStop(1, '#3a0a5e');
  ctx.fillStyle = cg2;
  ctx.beginPath(); ctx.arc(0, 0, size * 1.05, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,' + (0.25 + flash * 0.75).toFixed(2) + ')';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, size * 1.05, 0, TAU); ctx.stroke();
  // hp pips fanned above the core
  for (let i = 0; i < boss.maxHp; i++) {
    const a0 = -Math.PI / 2 + (i - boss.maxHp / 2 + 0.5) * 0.26;
    ctx.strokeStyle = i < boss.hp ? '#ff5a8c' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = Math.max(2, size * 0.1);
    ctx.beginPath(); ctx.arc(0, 0, size * 1.45, a0 - 0.09, a0 + 0.09); ctx.stroke();
  }
  ctx.restore();
}

// energy wall strung between the two ends of a barrier pair — drawn under the traps
function drawLineBeam(en, g) {
  const p = en.partner;
  if (!p || (en.dead && p.dead)) return;
  const rg = ring(Math.max(en.z, 0.02), g);
  const x1 = rg.x + Math.cos(en.angle) * rg.r, y1 = rg.y + Math.sin(en.angle) * rg.r;
  const x2 = rg.x + Math.cos(p.angle) * rg.r, y2 = rg.y + Math.sin(p.angle) * rg.r;
  let fade = en.resolved ? clamp(en.z / g.hitZ, 0, 1) : 1;
  fade *= clamp((1.08 - en.z) / 0.18, 0, 1);
  if (fade <= 0.005) return;
  const size = lerp(4, Math.min(W, H) * 0.06, 1 - en.z);
  // crackling midpoint gives the wall a live, electric bow
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const dx = x2 - x1, dy = y2 - y1;
  const dl = Math.hypot(dx, dy) || 1;
  const wob = Math.sin(time * 13 + en.spin) * size * 0.45;
  const cx2 = mx - dy / dl * wob, cy2 = my + dx / dl * wob;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.globalAlpha = fade * 0.55;
  ctx.strokeStyle = 'rgba(255,60,90,0.75)';
  ctx.lineWidth = Math.max(2, size * 0.5);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.quadraticCurveTo(cx2, cy2, x2, y2); ctx.stroke();
  ctx.globalAlpha = fade * 0.9;
  ctx.strokeStyle = 'rgba(255,180,195,0.9)';
  ctx.lineWidth = Math.max(0.8, size * 0.12);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.quadraticCurveTo(cx2, cy2, x2, y2); ctx.stroke();
  ctx.restore();
}

function drawNodes(g) {
  const bzn = Math.min(W, H) * 0.055;
  const railR = g.nodeR - bzn * 0.86;             // carriages ride the rails on the ring's inner face
  const nearR = { x: g.cx, y: g.cy, r: railR };
  for (let i = 0; i < 2; i++) {
    const n = nodes[i];
    const x = nearR.x + Math.cos(n.angle) * nearR.r;
    const y = nearR.y + Math.sin(n.angle) * nearR.r;
    const size = Math.min(W, H) * 0.038;
    const cCol = i === 0 ? '111,227,255' : '255,255,255'; // left: Tron cyan, right: white
    // lightcycle ribbon trail
    const vel = angDiff(n.angle, n.prevA === undefined ? n.angle : n.prevA);
    n.trailV = (n.trailV || 0) * 0.8 + vel * 0.2;
    n.prevA = n.angle;
    const tl = clamp(Math.abs(n.trailV) * 10, 0, 1.5);
    if (tl > 0.04) {
      const dir = Math.sign(n.trailV) || 1;
      ctx.lineCap = 'round';
      ctx.strokeStyle = `rgba(${cCol},0.3)`;
      ctx.lineWidth = size * 1.5;
      ctx.beginPath();
      ctx.arc(nearR.x, nearR.y, nearR.r, n.angle - dir * tl, n.angle, dir < 0);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(240,252,255,0.55)';
      ctx.lineWidth = size * 0.4;
      ctx.beginPath();
      ctx.arc(nearR.x, nearR.y, nearR.r, n.angle - dir * tl, n.angle, dir < 0);
      ctx.stroke();
    }
    // coverage arc hint — drawn on the ring itself; grows/shrinks with wide-arc
    const cov = 0.314 * tolVis;
    const wideGlow = clamp((tolVis - 1) / 0.7, 0, 1);
    ctx.beginPath();
    ctx.arc(nearR.x, nearR.y, g.nodeR, n.angle - cov, n.angle + cov);
    ctx.strokeStyle = `rgba(${cCol},${(0.5 + wideGlow * 0.3).toFixed(2)})`;
    ctx.lineWidth = 4 + wideGlow * 2.5; ctx.lineCap = 'round'; ctx.stroke();
    if (wideGlow > 0.02) { // golden shimmer while the arc is overcharged
      ctx.beginPath();
      ctx.arc(nearR.x, nearR.y, g.nodeR + 5, n.angle - cov, n.angle + cov);
      ctx.strokeStyle = `rgba(255,210,74,${(wideGlow * (0.35 + Math.sin(time * 6) * 0.15)).toFixed(2)})`;
      ctx.lineWidth = 2; ctx.stroke();
    }
    // glow
    const gl = ctx.createRadialGradient(x, y, 0, x, y, size * 2.6);
    gl.addColorStop(0, `rgba(${cCol},0.6)`);
    gl.addColorStop(1, `rgba(${cCol},0)`);
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(x, y, size * 2.6, 0, TAU); ctx.fill();
    // maglev carriage — a techy sled locked onto the rails, gripping the ring
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(n.angle); // +x = radially outward, +y = along the rail
    const rh = size * 2.5, rw = size * 1.05;
    // grip struts reaching out onto the ring, with glowing contact pads
    ctx.fillStyle = '#0a1220';
    roundRect(rw * 0.2, -rh * 0.44, bzn * 0.95, rh * 0.16, 3); ctx.fill();
    roundRect(rw * 0.2, rh * 0.28, bzn * 0.95, rh * 0.16, 3); ctx.fill();
    ctx.fillStyle = `rgba(${cCol},0.85)`;
    ctx.fillRect(rw * 0.2 + bzn * 0.78, -rh * 0.42, 2.5, rh * 0.12);
    ctx.fillRect(rw * 0.2 + bzn * 0.78, rh * 0.30, 2.5, rh * 0.12);
    // drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    roundRect(-rw / 2 + 2, -rh / 2 + 3, rw, rh, rw * 0.35); ctx.fill();
    // metallic hull
    const hull = ctx.createLinearGradient(-rw / 2, 0, rw / 2, 0);
    hull.addColorStop(0, '#31435f'); hull.addColorStop(0.5, '#141c2c'); hull.addColorStop(1, '#0a0f18');
    ctx.fillStyle = hull;
    roundRect(-rw / 2, -rh / 2, rw, rh, rw * 0.35); ctx.fill();
    ctx.strokeStyle = '#03060c'; ctx.lineWidth = 2;
    roundRect(-rw / 2, -rh / 2, rw, rh, rw * 0.35); ctx.stroke();
    // luminous strip along the inner edge (facing the tunnel)
    ctx.strokeStyle = `rgba(${cCol},0.95)`; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-rw * 0.36, -rh * 0.38); ctx.lineTo(-rw * 0.36, rh * 0.38); ctx.stroke();
    ctx.strokeStyle = `rgba(${cCol},0.35)`; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(rw * 0.3, -rh * 0.34); ctx.lineTo(rw * 0.3, rh * 0.34); ctx.stroke();
    // energy core window
    const cg2 = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.42);
    cg2.addColorStop(0, '#ffffff');
    cg2.addColorStop(0.5, `rgba(${cCol},0.95)`);
    cg2.addColorStop(1, `rgba(${cCol},0.15)`);
    ctx.fillStyle = cg2;
    ctx.beginPath(); ctx.arc(0, 0, size * 0.42, 0, TAU); ctx.fill();
    ctx.strokeStyle = 'rgba(240,252,255,0.8)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, size * 0.3, 0, TAU); ctx.stroke();
    // running lights at both ends
    ctx.fillStyle = `rgba(${cCol},0.95)`;
    ctx.beginPath(); ctx.arc(0, -rh * 0.42, 2.5, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(0, rh * 0.42, 2.5, 0, TAU); ctx.fill();
    ctx.restore();
  }
}

function drawDials() {
  for (let i = 0; i < 2; i++) {
    const side = i === 0 ? 'L' : 'R';
    const d = dialCenter(side);
    const n = nodes[i];
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, TAU);
    ctx.strokeStyle = i === 0 ? 'rgba(77,141,255,0.85)' : 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 3; ctx.stroke();
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, TAU);
    ctx.fillStyle = 'rgba(10,20,45,0.35)'; ctx.fill();
    // knob
    const kx = d.x + Math.cos(n.angle) * d.r, ky = d.y + Math.sin(n.angle) * d.r;
    const ks = d.r * 0.3;
    const gl = ctx.createRadialGradient(kx, ky, 0, kx, ky, ks * 2);
    gl.addColorStop(0, i === 0 ? 'rgba(77,141,255,0.6)' : 'rgba(255,255,255,0.55)');
    gl.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(kx, ky, ks * 2, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(kx, ky, ks, 0, TAU);
    ctx.fillStyle = n.color; ctx.fill();
    ctx.strokeStyle = i === 0 ? '#7db2ff' : '#9fc4e0'; ctx.lineWidth = 2; ctx.stroke();
    // radar blips: live enemy positions — angle matches the tunnel, radius = how close they are
    const blipXY = en => {
      const rr = d.r * (1 - clamp(en.z, 0, 1) * 0.85);
      return { x: d.x + Math.cos(en.angle) * rr, y: d.y + Math.sin(en.angle) * rr };
    };
    for (const en of enemies) {
      if (en.dead || en.resolved) continue;
      const { x: bx, y: by } = blipXY(en);
      const bs = (2.5 + (1 - en.z) * 4) * (en.type === 'heavy' ? 1.5 : 1);
      const urgent = en.z < 0.35 && Math.sin(time * 10) > 0; // blink when close
      const al = urgent || en.z >= 0.35 ? 0.95 : 0.4;
      // barrier pairs show their wall on the radar too
      if (en.lineLead && en.partner && !en.partner.dead) {
        const p2 = blipXY(en.partner);
        ctx.strokeStyle = `rgba(255,80,110,${al * 0.6})`; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(p2.x, p2.y); ctx.stroke();
      }
      ctx.fillStyle = en.type === 'frag'
        ? `rgba(110,230,120,${al})`
        : en.type === 'heavy'
        ? `rgba(200,80,255,${al})`
        : en.lock === 0
        ? `rgba(80,170,255,${al})`
        : en.lock === 1
        ? `rgba(240,248,255,${al})`
        : en.crawler
        ? `rgba(255,140,40,${al})`
        : `rgba(220,50,50,${al})`;
      ctx.fillRect(bx - bs / 2, by - bs / 2, bs, bs);
    }
    // golden pickup blips
    for (const p of pickups) {
      if (p.done) continue;
      const { x: gx, y: gy } = blipXY(p);
      ctx.fillStyle = 'rgba(255,210,74,0.9)';
      ctx.beginPath(); ctx.arc(gx, gy, 2.5 + (1 - p.z) * 2, 0, TAU); ctx.fill();
    }
    // the firewall core: oversized blinking blip
    if (boss) {
      const { x: bx2, y: by2 } = blipXY(boss);
      ctx.fillStyle = Math.sin(time * 8) > 0 ? 'rgba(210,80,255,0.95)' : 'rgba(210,80,255,0.45)';
      const bs2 = 7;
      ctx.fillRect(bx2 - bs2 / 2, by2 - bs2 / 2, bs2, bs2);
    }
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------- holographic HUD kit ----------
// chamfered slab — corners cut on the top-left / bottom-right diagonal
function techRect(x, y, w, h, cut) {
  ctx.beginPath();
  ctx.moveTo(x + cut, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w, y + h - cut);
  ctx.lineTo(x + w - cut, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + cut);
  ctx.closePath();
}
// floating bracket corners, like a target lock
function cornerBrackets(x, y, w, h, len, col) {
  ctx.strokeStyle = col; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x, y + len); ctx.lineTo(x, y); ctx.lineTo(x + len, y);
  ctx.moveTo(x + w - len, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + len);
  ctx.moveTo(x + w, y + h - len); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w - len, y + h);
  ctx.moveTo(x + len, y + h); ctx.lineTo(x, y + h); ctx.lineTo(x, y + h - len);
  ctx.stroke();
}
// cluster of small + marks — HUD garnish
function plusCluster(x, y, col) {
  ctx.strokeStyle = col; ctx.lineWidth = 1.5;
  const s = 3.5, gap = 12;
  for (let i = 0; i < 8; i++) {
    if (i === 3 || i === 6) continue; // ragged edge, like the mock
    const cx2 = x + (i % 4) * gap, cy2 = y + ((i / 4) | 0) * gap;
    ctx.beginPath();
    ctx.moveTo(cx2 - s, cy2); ctx.lineTo(cx2 + s, cy2);
    ctx.moveTo(cx2, cy2 - s); ctx.lineTo(cx2, cy2 + s);
    ctx.stroke();
  }
}
// glass console panel with a luminous header band; returns the header height
function techPanel(x, y, w, h, title) {
  const cut = 16;
  techRect(x, y, w, h, cut);
  ctx.fillStyle = 'rgba(4,14,30,0.92)'; ctx.fill();
  ctx.shadowColor = 'rgba(95,215,255,0.55)'; ctx.shadowBlur = lowFX ? 0 : 16;
  ctx.strokeStyle = 'rgba(110,210,255,0.65)'; ctx.lineWidth = 1.5;
  techRect(x, y, w, h, cut); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(110,210,255,0.16)'; ctx.lineWidth = 1;
  techRect(x + 4, y + 4, w - 8, h - 8, cut - 3); ctx.stroke();
  const hh = 32;
  ctx.save();
  techRect(x, y, w, h, cut); ctx.clip();
  const hg = ctx.createLinearGradient(x, y, x + w * 0.85, y);
  hg.addColorStop(0, 'rgba(80,190,255,0.35)');
  hg.addColorStop(1, 'rgba(80,190,255,0.02)');
  ctx.fillStyle = hg; ctx.fillRect(x, y, w, hh);
  ctx.strokeStyle = 'rgba(120,220,255,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, y + hh); ctx.lineTo(x + w, y + hh); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#cfeeff';
  try { ctx.letterSpacing = '3px'; } catch (e) {}
  ctx.font = '700 13px system-ui'; ctx.textAlign = 'left';
  ctx.fillText(title, x + 20, y + 21);
  try { ctx.letterSpacing = '0px'; } catch (e) {}
  cornerBrackets(x - 7, y - 7, w + 14, h + 14, 14, 'rgba(120,220,255,0.55)');
  return hh;
}

function drawHUD(g) {
  const L = LV || LEVELS[levelIdx];
  const pad = 14;

  // level intro title — fades out as the run begins (lingers longer when there's a threat hint)
  const introDur = L.hint ? 3.6 : 2.4;
  if (levelT < introDur && !tut) {
    const a = levelT < introDur - 0.6 ? 1 : (introDur - levelT) / 0.6;
    ctx.textAlign = 'center';
    ctx.globalAlpha = a;
    try { ctx.letterSpacing = '5px'; } catch (e) {}
    ctx.fillStyle = 'rgba(200,235,255,0.8)'; ctx.font = '600 12px system-ui';
    ctx.fillText(endless ? 'SURVIVE' : 'LEVEL ' + (levelIdx + 1), W / 2, H * 0.16);
    ctx.fillStyle = '#eafaff'; ctx.font = '800 ' + Math.min(W * 0.045, 26) + 'px system-ui';
    ctx.shadowColor = '#5fd7ff'; ctx.shadowBlur = 18;
    ctx.fillText(L.name, W / 2, H * 0.16 + 30);
    ctx.shadowBlur = 0;
    try { ctx.letterSpacing = '0px'; } catch (e) {}
    if (L.hint) {
      ctx.fillStyle = '#ffb8c8'; ctx.font = '600 13px system-ui';
      ctx.fillText(L.hint, W / 2, H * 0.16 + 54);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // left curved bar: LEVEL PROGRESS (green, hugs the node ring like the mock)
  // radius is clamped so the arc tips + stroke casing always stay on screen —
  // on wide phones the unclamped radius pushed the tips past the top edge
  const bw2 = Math.max(9, Math.min(W, H) * 0.024);
  const ELEV = Math.PI * 0.34; // how far above horizontal the arc tips rise
  const barR = Math.min(g.nodeR + Math.min(W, H) * 0.095, (H / 2 - bw2 - 8) / Math.sin(ELEV));
  const aL0 = Math.PI * 1.06, aL1 = Math.PI + ELEV; // lower-left → upper-left
  ctx.lineCap = 'round';
  ctx.strokeStyle = 'rgba(240,250,255,0.85)'; ctx.lineWidth = bw2 + 5;
  ctx.beginPath(); ctx.arc(g.cx, g.cy, barR, aL0, aL1); ctx.stroke();
  ctx.strokeStyle = '#050a12'; ctx.lineWidth = bw2 + 2;
  ctx.beginPath(); ctx.arc(g.cx, g.cy, barR, aL0, aL1); ctx.stroke();
  // endless: the left bar shows the difficulty ramp instead of level progress
  const prog = endless ? clamp(levelT / 150, 0, 1) : clamp(levelT / L.duration, 0, 1);
  if (prog > 0.005) {
    ctx.strokeStyle = endless ? '#ff9a3c' : '#7ee262';
    ctx.lineWidth = bw2 - 4;
    ctx.beginPath(); ctx.arc(g.cx, g.cy, barR, aL0, aL0 + (aL1 - aL0) * prog); ctx.stroke();
  }

  // right curved bar: 4 life blocks joined into one bar — no outline, just the blocks
  const MAXM = 4, blocksLeft = Math.max(0, Math.ceil(integrity / 25));
  const aR0 = -Math.PI * 0.06, aR1 = -ELEV; // mirrored: lower-right → upper-right
  const span = (aR0 - aR1) / MAXM, gap2 = span * 0.07; // thin seams keep them reading as one bar
  ctx.lineCap = 'butt';
  for (let i = 0; i < MAXM; i++) {
    const s0 = aR0 - (i + 1) * span + gap2 / 2, s1 = aR0 - i * span - gap2 / 2;
    if (i < blocksLeft) {
      ctx.strokeStyle = '#8fc7ff'; ctx.lineWidth = bw2;
      ctx.beginPath(); ctx.arc(g.cx, g.cy, barR, s0, s1); ctx.stroke();
    } else {
      ctx.strokeStyle = 'rgba(15,28,48,0.8)'; ctx.lineWidth = bw2;
      ctx.beginPath(); ctx.arc(g.cx, g.cy, barR, s0, s1); ctx.stroke();
    }
  }
  ctx.lineCap = 'round';

  // score (right)
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd24a'; ctx.font = '700 20px system-ui';
  ctx.fillText(score.toLocaleString(), W - pad - SAFE.r, H * 0.12 + 8);
  ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '600 10px system-ui';
  ctx.fillText('SCORE', W - pad - SAFE.r, H * 0.12 + 24);
  if (combo >= 3) {
    ctx.fillStyle = '#ffd24a'; ctx.font = '700 14px system-ui';
    ctx.fillText('COMBO x' + Math.min(combo, 5), W - pad - SAFE.r, H * 0.12 + 48);
  }
  const mm = mutMul();
  if (mm > 1) {
    ctx.fillStyle = 'rgba(255,210,74,0.85)'; ctx.font = '700 11px system-ui';
    ctx.fillText('MODIFIERS ×' + (Math.round(mm * 100) / 100), W - pad - SAFE.r, H * 0.12 + 66);
  }
  ctx.textAlign = 'left';

  // pause button (top-left)
  pauseBtnRect = { x: 12 + SAFE.l, y: 12 + SAFE.t, w: 38, h: 38 };
  techRect(pauseBtnRect.x, pauseBtnRect.y, pauseBtnRect.w, pauseBtnRect.h, 8);
  ctx.fillStyle = 'rgba(6,20,40,0.6)'; ctx.fill();
  ctx.strokeStyle = 'rgba(120,220,255,0.55)'; ctx.lineWidth = 1.5;
  techRect(pauseBtnRect.x, pauseBtnRect.y, pauseBtnRect.w, pauseBtnRect.h, 8); ctx.stroke();
  ctx.fillStyle = 'rgba(220,245,255,0.92)';
  ctx.fillRect(pauseBtnRect.x + 12, pauseBtnRect.y + 11, 5, 16);
  ctx.fillRect(pauseBtnRect.x + 21, pauseBtnRect.y + 11, 5, 16);

  // active power-up chips (top center)
  const active = Object.keys(fx).filter(k => fx[k] > 0);
  active.forEach((k, i) => {
    const cw = 92, chh = 20;
    const x0 = W / 2 - (active.length * (cw + 8) - 8) / 2 + i * (cw + 8);
    const y0 = 14 + SAFE.t;
    techRect(x0, y0, cw, chh, 6);
    ctx.fillStyle = 'rgba(60,40,5,0.65)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,210,74,0.8)'; ctx.lineWidth = 1;
    techRect(x0, y0, cw, chh, 6); ctx.stroke();
    ctx.fillStyle = '#ffe9b0'; ctx.font = '700 10px system-ui'; ctx.textAlign = 'left';
    ctx.fillText(PICKUPS[k].label, x0 + 9, y0 + 14);
    ctx.fillStyle = 'rgba(255,210,74,0.9)';
    ctx.fillRect(x0, y0 + chh + 3, cw * clamp(fx[k] / PICKUPS[k].dur, 0, 1), 2);
  });

  // tutorial prompts + guides
  if (tut) {
    const ten = enemies.find(e => e.tut && !e.dead && !e.resolved);
    let msg = null;
    if (tut.step <= 1) msg = 'Slide your LEFT thumb — align the BLUE node with the trap';
    else if (tut.step === 2) msg = 'NICE!  Missed traps corrupt the payload';
    else if (tut.step === 3) msg = 'Now your RIGHT thumb — align the WHITE node';
    else if (tut.step === 4) msg = "You're ready — defend the payload!";
    if (msg) {
      const a = 0.75 + Math.sin(time * 4) * 0.25;
      ctx.textAlign = 'center';
      ctx.font = '700 ' + Math.min(W * 0.026, 17) + 'px system-ui';
      const tw = ctx.measureText(msg).width;
      ctx.fillStyle = 'rgba(9,20,40,0.72)';
      roundRect(W / 2 - tw / 2 - 16, H * 0.70 - 20, tw + 32, 30, 8); ctx.fill();
      ctx.fillStyle = 'rgba(190,240,255,' + a.toFixed(2) + ')';
      ctx.fillText(msg, W / 2, H * 0.70);
      ctx.textAlign = 'left';
    }
    if (ten) {
      drawGuideArc(nodes[ten.tut === 'L' ? 0 : 1], ten.angle);
      const d = dialCenter(ten.tut);
      const pr = d.r + 6 + Math.sin(time * 5) * 3;
      ctx.strokeStyle = ten.tut === 'L' ? 'rgba(111,227,255,0.8)' : 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(d.x, d.y, pr, 0, TAU); ctx.stroke();
    }
  }
}

// marching dashed arc from a node toward the tutorial trap, with an arrowhead
function drawGuideArc(n, targetA) {
  const g2 = geo();
  const rr = g2.nodeR - Math.min(W, H) * 0.055 * 2.0;
  const d = angDiff(targetA, n.angle);
  if (Math.abs(d) < 0.3) return; // close enough — no guide needed
  const dir = Math.sign(d);
  const a0 = n.angle + dir * 0.12, a1 = n.angle + d * 0.82;
  ctx.save();
  ctx.strokeStyle = 'rgba(120,225,255,0.85)';
  ctx.lineWidth = 3;
  ctx.setLineDash([9, 9]);
  ctx.lineDashOffset = -time * 60 * dir;
  ctx.beginPath(); ctx.arc(g2.cx, g2.cy, rr, a0, a1, dir < 0); ctx.stroke();
  ctx.setLineDash([]);
  const hx = g2.cx + Math.cos(a1) * rr, hy = g2.cy + Math.sin(a1) * rr;
  ctx.translate(hx, hy); ctx.rotate(a1 + dir * Math.PI / 2);
  ctx.fillStyle = 'rgba(160,240,255,0.95)';
  ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-5, -6); ctx.lineTo(-5, 6); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// one audio channel row: label · angular toggle · tick-marked slider (shared by pause + menu)
function settingRow(label, key, volKey, y, px, pw, tox) {
  ctx.textAlign = 'left'; ctx.fillStyle = 'rgba(160,225,255,0.95)';
  try { ctx.letterSpacing = '2px'; } catch (e) {}
  ctx.font = '700 12px system-ui';
  ctx.fillText(label, px + 24, y + 4);
  try { ctx.letterSpacing = '0px'; } catch (e) {}
  // angular toggle slab
  const tx = px + (tox || 96), tw = 52, th = 24, on = settings[key];
  techRect(tx, y - th / 2, tw, th, 6);
  ctx.fillStyle = on ? 'rgba(40,140,210,0.55)' : 'rgba(255,255,255,0.06)'; ctx.fill();
  ctx.strokeStyle = on ? 'rgba(140,230,255,0.8)' : 'rgba(120,180,255,0.3)'; ctx.lineWidth = 1.5;
  techRect(tx, y - th / 2, tw, th, 6); ctx.stroke();
  const ks = th - 9;
  ctx.fillStyle = on ? '#dff6ff' : 'rgba(160,190,230,0.45)';
  ctx.fillRect(on ? tx + tw - ks - 4.5 : tx + 4.5, y - ks / 2, ks, ks);
  pauseTogglesList.push({ x: tx, y: y - th / 2, w: tw, h: th, key });
  if (!volKey) return; // toggle-only row (e.g. haptics)
  // volume rail with depth ticks and a diamond cursor
  const sx = tx + tw + 26, sw2 = px + pw - 36 - sx;
  ctx.lineCap = 'butt';
  ctx.strokeStyle = 'rgba(120,200,255,0.16)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + sw2, y); ctx.stroke();
  ctx.strokeStyle = 'rgba(120,200,255,0.35)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 8; i++) {
    const tx2 = sx + sw2 * i / 8;
    ctx.beginPath(); ctx.moveTo(tx2, y + 6); ctx.lineTo(tx2, y + 10); ctx.stroke();
  }
  const v = settings[volKey];
  ctx.strokeStyle = on ? 'rgba(111,227,255,0.9)' : 'rgba(120,150,200,0.3)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + sw2 * v, y); ctx.stroke();
  ctx.save();
  ctx.translate(sx + sw2 * v, y); ctx.rotate(Math.PI / 4);
  ctx.fillStyle = on ? '#eafaff' : 'rgba(200,210,230,0.5)';
  ctx.fillRect(-6, -6, 12, 12);
  ctx.strokeStyle = on ? 'rgba(111,227,255,0.9)' : 'rgba(160,190,230,0.4)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(-6, -6, 12, 12);
  ctx.restore();
  ctx.lineCap = 'round';
  pauseSlidersList.push({ x: sx, y, w: sw2, key: volKey });
}
// shared toggle/slider hit test — returns true if the tap landed on a control
function settingsTap(x, y, pid) {
  for (const t of pauseTogglesList) {
    if (x > t.x - 8 && x < t.x + t.w + 8 && y > t.y - 8 && y < t.y + t.h + 8) {
      settings[t.key] = !settings[t.key]; applySettings(); sfx.tick(); return true;
    }
  }
  for (const s of pauseSlidersList) {
    if (x > s.x - 14 && x < s.x + s.w + 14 && Math.abs(y - s.y) < 20) {
      settings[s.key] = clamp((x - s.x) / s.w, 0, 1); applySettings();
      pauseDrag[pid] = s; return true;
    }
  }
  return false;
}

function drawPause() {
  pauseButtonsList = []; pauseSlidersList = []; pauseTogglesList = [];
  ctx.fillStyle = 'rgba(3,6,14,0.78)'; ctx.fillRect(0, 0, W, H);
  const pw = Math.min(W * 0.74, 540), ph = Math.min(H * 0.86, 330);
  const px = W / 2 - pw / 2, py = H / 2 - ph / 2;
  techPanel(px, py, pw, ph, 'SYSTEM PAUSED');
  settingRow('SFX',        'sound',     'soundVol', py + 70,  px, pw);
  settingRow('MUSIC',      'music',     'musicVol', py + 108, px, pw);
  settingRow('HAPTICS',    'haptics',   null,       py + 146, px, pw);
  settingRow('AIM ASSIST', 'aimAssist', null,       py + 184, px, pw);
  // live console readout, pure garnish
  ctx.fillStyle = 'rgba(120,210,255,0.35)'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
  ctx.fillText('m_fSfxVol = ' + settings.soundVol.toFixed(2) + 'f;   m_fMusicVol = ' + settings.musicVol.toFixed(2) + 'f;', px + 24, py + 216);

  const bh = 44, gap = 12, bw = (pw - 48 - gap * 2) / 3;
  let bx = px + 24; const by = py + ph - bh - 20;
  [['RESUME', 'resume', true], ['RESTART', 'restart', false], ['QUIT', 'menu', false]].forEach(([label, action, primary]) => {
    button(bx, by, bw, bh, label, primary);
    pauseButtonsList.push({ x: bx, y: by, w: bw, h: bh, action });
    bx += bw + gap;
  });
  ctx.textAlign = 'left';
}

function pauseTap(x, y, pid) {
  if (settingsTap(x, y, pid)) return;
  for (const b of pauseButtonsList) {
    if (x > b.x && x < b.x + b.w && y > b.y && y < b.y + b.h) {
      sfx.tick();
      if (b.action === 'resume') state = S.PLAY;
      else if (b.action === 'restart') startLevel(levelIdx);
      else { state = S.MENU; playTrack('menu'); }
      return;
    }
  }
}

function drawStars(cx, cy, count, size, t) {
  for (let i = 0; i < 3; i++) {
    const x = cx + (i - 1) * size * 2.6;
    const on = i < count && t > 0.4 + i * 0.35;
    ctx.save();
    ctx.translate(x, cy);
    const pop = on ? 1 + Math.max(0, 0.5 - (t - (0.4 + i * 0.35))) * 1.2 : 1;
    ctx.scale(pop, pop);
    ctx.beginPath();
    for (let k = 0; k < 10; k++) {
      const a = -Math.PI / 2 + k / 10 * TAU;
      const r = k % 2 === 0 ? size : size * 0.45;
      k === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fillStyle = on ? '#ffd24a' : 'rgba(255,255,255,0.15)';
    ctx.fill();
    ctx.restore();
  }
}

function button(x, y, w, h, label, primary, locked) {
  // holographic console key: chamfered glass slab, luminous edge, energy bar on the left
  const cut = Math.min(12, h * 0.28);
  techRect(x, y, w, h, cut);
  ctx.fillStyle = locked ? 'rgba(90,160,255,0.05)' : primary ? 'rgba(30,120,190,0.35)' : 'rgba(10,36,64,0.45)';
  ctx.fill();
  if (locked) {
    // hazard hatching across the disabled key
    ctx.save();
    techRect(x, y, w, h, cut); ctx.clip();
    ctx.strokeStyle = 'rgba(120,180,255,0.10)'; ctx.lineWidth = 6;
    for (let sx = x - h; sx < x + w; sx += 20) {
      ctx.beginPath(); ctx.moveTo(sx, y + h + 2); ctx.lineTo(sx + h + 4, y - 2); ctx.stroke();
    }
    ctx.restore();
    ctx.strokeStyle = 'rgba(120,180,255,0.20)'; ctx.lineWidth = 1;
    techRect(x, y, w, h, cut); ctx.stroke();
  } else {
    ctx.shadowColor = 'rgba(95,215,255,0.8)'; ctx.shadowBlur = lowFX ? 0 : (primary ? 14 : 6);
    ctx.strokeStyle = primary ? 'rgba(150,238,255,0.95)' : 'rgba(95,200,255,0.55)';
    ctx.lineWidth = 1.5;
    techRect(x, y, w, h, cut); ctx.stroke();
    ctx.shadowBlur = 0;
    // energy bar + bottom-right corner tick
    ctx.fillStyle = primary ? '#a8ecff' : 'rgba(120,220,255,0.7)';
    ctx.fillRect(x + 6, y + h * 0.28, 3, h * 0.44);
    ctx.strokeStyle = primary ? 'rgba(168,236,255,0.9)' : 'rgba(120,220,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + w - cut - 8, y + h - 3.5); ctx.lineTo(x + w - cut + 2, y + h - 3.5);
    ctx.stroke();
  }
  ctx.fillStyle = locked ? 'rgba(160,200,255,0.3)' : primary ? '#eefaff' : '#bfeaff';
  try { ctx.letterSpacing = '2px'; } catch (e) {}
  ctx.font = '600 14px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  try { ctx.letterSpacing = '0px'; } catch (e) {}
  ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
}

// five-point star, filled gold when earned
function star5(cx, cy, r, filled) {
  ctx.beginPath();
  for (let k = 0; k < 10; k++) {
    const a = -Math.PI / 2 + k * Math.PI / 5;
    const rr = k % 2 === 0 ? r : r * 0.46;
    const px2 = cx + Math.cos(a) * rr, py2 = cy + Math.sin(a) * rr;
    k === 0 ? ctx.moveTo(px2, py2) : ctx.lineTo(px2, py2);
  }
  ctx.closePath();
  if (filled) {
    ctx.fillStyle = '#ffd24a'; ctx.fill();
    ctx.strokeStyle = 'rgba(90,60,0,0.55)'; ctx.lineWidth = 1; ctx.stroke();
  } else {
    ctx.strokeStyle = 'rgba(235,248,255,0.8)'; ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round'; ctx.stroke(); ctx.lineJoin = 'miter';
  }
}
function padlock(cx, cy, s) {
  ctx.strokeStyle = 'rgba(220,240,255,0.5)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy - s * 0.35, s * 0.55, Math.PI, 0); ctx.stroke();
  ctx.fillStyle = 'rgba(220,240,255,0.5)';
  roundRect(cx - s * 0.8, cy - s * 0.35, s * 1.6, s * 1.1, 2); ctx.fill();
}
// level select key — the game's console-key look, with the rating / lock badge on the right
function levelKey(x, y, w, h, num, name, stars, locked, primary) {
  const cut = Math.min(12, h * 0.28);
  techRect(x, y, w, h, cut);
  ctx.fillStyle = locked ? 'rgba(90,160,255,0.05)' : primary ? 'rgba(30,120,190,0.35)' : 'rgba(10,36,64,0.45)';
  ctx.fill();
  if (locked) {
    ctx.save(); techRect(x, y, w, h, cut); ctx.clip();
    ctx.strokeStyle = 'rgba(120,180,255,0.10)'; ctx.lineWidth = 6;
    for (let sx = x - h; sx < x + w; sx += 20) {
      ctx.beginPath(); ctx.moveTo(sx, y + h + 2); ctx.lineTo(sx + h + 4, y - 2); ctx.stroke();
    }
    ctx.restore();

// geometry shared by the static menu layer and the live level keys

}

// ---------- perf watchdog: shed visual load if the frame rate slips ----------
function perfWatch(rawDt) {
  if (lowFX || time < 5 || rawDt > 0.5) return; // ignore startup jank + tab-switch gaps
  perfAcc += rawDt; perfN++; perfWin += rawDt;
  if (perfWin >= 2) { // ~2s rolling window
    if (perfAcc / perfN > 1 / 42) { // sustained under ~42fps → permanently shed load
      lowFX = true;
      initStreaks();
      wallSnips.length = Math.min(wallSnips.length, 14);
    }
    perfAcc = 0; perfN = 0; perfWin = 0;
  }
}

// ---------- main loop ----------
let last = performance.now();

  const dt = Math.min(rawDt, 0.05);
  last = now;
